<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta FIPE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>Consulta FIPE por Excel</h1>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <input type="file" name="file" accept=".xlsx" required>

            <button type="submit">
                Consultar FIPE
            </button>

        </form>

        <div class="info">
            <h3>Formato da planilha:</h3>

            <table>
                <tr>
                    <th>Brand</th>
                    <th>Model</th>
                    <th>Year</th>
                </tr>
                <tr>
                    <td>Toyota</td>
                    <td>Corolla</td>
                    <td>2020</td>
                </tr>
            </table>
        </div>

    </div>

</body>
</html>
